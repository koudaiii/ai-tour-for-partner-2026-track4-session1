---
- hosts: guests:extras
  become: yes
  gather_facts: yes
  tasks:
    - apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present

    - name: install postgresql apt repository key
      shell: |
        set -euo pipefail
        install -d -m 0755 /etc/apt/keyrings
        curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | gpg --dearmor -o /etc/apt/keyrings/postgresql.gpg
      args:
        executable: /bin/bash

    - name: add postgresql apt repository
      apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/postgresql.gpg] http://apt.postgresql.org/pub/repos/apt {{ ansible_distribution_release }}-pgdg main"
        state: present
        filename: pgdg

    - apt:
        update_cache: yes

    - apt:
        name:
          - postgresql-18
          - postgresql-client-18
        state: present

    - apt: name=python3-psycopg2 state=present
    - name: start postgresql
      service: name=postgresql state=started enabled=yes
    - name: create postgresql user
      become_user: postgres
      community.postgresql.postgresql_user:
        name: isuconp
        password: isuconp
        role_attr_flags: CREATEDB
        state: present
    - name: create postgresql database
      become_user: postgres
      community.postgresql.postgresql_db:
        name: isuconp
        owner: isuconp
        state: present
